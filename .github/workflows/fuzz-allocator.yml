name: Fuzz Allocator

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  qemu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-misc

      - name: Run allocator fuzz in QEMU
        run: |
          set +e
          timeout 20s make run DEBUG=1 FEATURES=fuzz-allocator > qemu-fuzz.log 2>&1
          status=$?
          set -e

          cat qemu-fuzz.log

          if [ "$status" -ne 0 ] && [ "$status" -ne 124 ]; then
            exit "$status"
          fi

          grep -q "allocator fuzz: ok" qemu-fuzz.log
          ! grep -q "kernel panic" qemu-fuzz.log
