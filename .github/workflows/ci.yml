name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  ARCH: riscv64gc-unknown-none-elf

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Install rustfmt toolchain
        run: rustup toolchain install "$(cat .rustfmt-toolchain)" --component rustfmt

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Spell check (typos)
        uses: crate-ci/typos@v1.48.0

      - name: Format (rustfmt)
        run: ./fmt --check

      - name: Boot section annotations
        run: make check-boot-sections

      - name: Lint (clippy)
        run: cargo clippy --target=${{ env.ARCH }} --release -- -D warnings

      - name: Test (host)
        run: make test

      - name: Check (full build verification)
        run: cargo check --target=${{ env.ARCH }} --release
