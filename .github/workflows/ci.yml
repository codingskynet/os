name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  ARCH: riscv64gc-unknown-none-elf

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Install rustfmt toolchain
        run: rustup toolchain install "$(cat .rustfmt-toolchain)" --component rustfmt

      - name: Format (rustfmt)
        run: ./fmt --check

      - name: Lint (clippy)
        run: cargo clippy --target=${{ env.ARCH }} --release -- -D warnings

      - name: Test (host)
        run: cargo test --lib

      - name: Check (full build verification)
        run: cargo check --target=${{ env.ARCH }} --release
