name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  ARCH: riscv64gc-unknown-none-elf
  ZIG_VERSION: 0.16.0

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install Rust toolchain
        run: rustup show

      - name: Install rustfmt toolchain
        run: rustup toolchain install "$(cat .rustfmt-toolchain)" --component rustfmt

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cache MicroPython checkout and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            userland/ports/micropython
            ~/.cache/zig
          key: micropython-${{ runner.os }}-${{ runner.arch }}-zig-${{ env.ZIG_VERSION }}-${{ hashFiles('userland/Makefile', 'userland/ports.toml', 'userland/patches/micropython/**') }}

      - name: Prepare MicroPython port
        run: make ports-prepare PORTS=micropython

      - name: Spell check (typos)
        uses: crate-ci/typos@v1.48.0

      - name: Format (rustfmt)
        run: ./fmt --check

      - name: Boot section annotations
        run: make check-boot-sections

      - name: Lint (clippy)
        run: make clippy

      - name: Test (host)
        run: make test

      - name: Check (full build verification)
        run: make cargo-check
