name: Smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  qemu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install QEMU
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: qemu-system-misc
          version: 1.0

      - name: Install cargo-binutils
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-binutils

      - name: Run smoke tests in QEMU
        run: |
          set +e
          timeout 20s make run DEBUG=1 FEATURES=smoke > qemu-smoke.log 2>&1
          status=$?
          set -e

          cat qemu-smoke.log

          if [ "$status" -ne 0 ] && [ "$status" -ne 124 ]; then
            exit "$status"
          fi

          grep -q "allocator fuzz: ok" qemu-smoke.log
          grep -q "page fault smoke: recovered" qemu-smoke.log
          ! grep -q "kernel panic" qemu-smoke.log
